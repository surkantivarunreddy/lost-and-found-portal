# ================================================
# APPLICATION PROPERTIES - Lost & Found Portal
# ================================================

# Server Configuration
server.port=8081
spring.application.name=lost-found-portal

# ================================================
# DATABASE CONFIGURATION  <-- CHANGE THESE
# ================================================
spring.datasource.url=jdbc:mysql://localhost:3306/lost_found_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================================================
# JWT CONFIGURATION  <-- CHANGE SECRET
# ================================================
app.jwt.secret=WW91clN1cGVyU2VjcmV0S2V5VGhhdFNob3VsZEJlQXRMZWFzdDI1NkJpdHNMb25nQ2hhbmdlVGhpcw==
app.jwt.expiration=86400000

# ================================================
# FILE UPLOAD CONFIGURATION
# ================================================
app.upload.dir=C:/MiniProject/LostAndFound/uploads/
spring.web.resources.static-locations=classpath:/static/,file:C:/MiniProject/LostAndFound/uploads/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================================
# CORS CONFIGURATION
# ================================================
app.cors.allowed-origins=http://localhost:3000

# ================================================
# LOGGING
# ================================================
logging.level.com.lostfound=DEBUG
logging.level.org.springframework.security=INFO